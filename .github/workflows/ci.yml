name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  build:
    name: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest

    outputs:
      directories: ${{ steps.matrix.outputs.directories }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies (musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt update
          sudo apt install musl-tools

      - name: Cargo build
        run: |
          rustup toolchain install stable --profile minimal -t ${{ matrix.target }}
          cargo +stable build --release --target ${{ matrix.target }}

      - name: Create e2e matrix
        id: matrix
        run: |
          directories=$(find e2e -mindepth 1 -maxdepth 1 -print0 -type d |
            jq -Rc 'split("\u0000") | map(select(length > 0))')
          echo "directories=$directories" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unnix-${{ runner.arch }}-${{ runner.os }}
          path: target/${{ matrix.target }}/release/unnix

  e2e-action:
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.build.outputs.directories) }}
        runner:
          - macos-latest
          - ubuntu-24.04-arm
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download unnix
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unnix-${{ runner.arch }}-${{ runner.os }}

      - name: Install unnix
        run: |
          chmod +x unnix
          mv unnix /usr/local/bin

      - name: Set up unnix
        uses: figsoda/unnix-action@027ef97d553bab6b4763dd3582e2a70bd6800cbf # v0.1.2
        with:
          directory: ${{ matrix.directory }}

      - name: Test
        run: |
          "$MATRIX_DIRECTORY/test"
        env:
          MATRIX_DIRECTORY: ${{ matrix.directory }}

  e2e-cli:
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - ubuntu-24.04-arm
          - ubuntu-latest
        with-nix:
          - false
          - true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download unnix
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unnix-${{ runner.arch }}-${{ runner.os }}

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        if: matrix.with-nix

      # support for overlay mounts was added in bubblewrap 0.11.0
      # which is not available in Ubuntu 24.04
      - name: Install bubblewrap
        if: matrix.with-nix
        run: |
          nix profile add nixpkgs#bubblewrap
          test -e /nix/store

      - name: Install bubblewrap
        if: "!matrix.with-nix"
        run: |
          sudo apt update
          sudo apt install bubblewrap
          test ! -e /nix/store

      - name: Install unnix
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          chmod +x unnix
          mv unnix /usr/local/bin

      - name: Test
        run: |
          find e2e -mindepth 1 -maxdepth 1 -print0 -type d |
            xargs -0I{} unnix env --locked -d {} {}/test

  nix:
    name: nix
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: aarch64-darwin
            runner: macos-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5

      - name: Set up cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: unnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Nix flake check
        run: nix flake check --system ${{ matrix.system }}
