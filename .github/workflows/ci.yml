name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest

    outputs:
      directories: ${{ steps.matrix.outputs.directories }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt update
          sudo apt install musl-tools

      - name: Cargo build
        run: |
          rustup toolchain install stable --profile minimal -t ${{ matrix.target }}
          cargo +stable build --release --target ${{ matrix.target }}

      - name: Create e2e matrix
        id: matrix
        run: |
          directories=$(find e2e -mindepth 1 -maxdepth 1 -print0 -type d |
            jq -Rc 'split("\u0000") | map(select(length > 0))')
          echo "directories=$directories" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: unnix-${{ runner.arch }}-${{ runner.os }}
          path: target/${{ matrix.target }}/release/unnix

  e2e-action:
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.build.outputs.directories) }}
        runner:
          - macos-latest
          - ubuntu-24.04-arm
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download unnix
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unnix-${{ runner.arch }}-${{ runner.os }}

      - name: Install unnix
        run: |
          chmod +x unnix
          mv unnix /usr/local/bin

      - name: Set up unnix
        uses: figsoda/unnix-action@v0.1.0-alpha.2
        with:
          directory: ${{ matrix.directory }}

      - name: Test
        run: ${{ matrix.directory }}/test

  nix:
    name: nix
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: aarch64-darwin
            runner: macos-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: x86_64-linux
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31

      - name: Set up cachix
        uses: cachix/cachix-action@v17
        with:
          name: unnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Nix flake check
        run: nix flake check --system ${{ matrix.system }}

  clippy-rustfmt:
    name: clippy-rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Cargo: clippy, fmt"
        run: |
          rustup toolchain install stable --profile minimal -c clippy
          rustup toolchain install nightly --profile minimal -c rustfmt
          cargo +stable clippy -- -D warnings
          cargo +nightly fmt -- --check
