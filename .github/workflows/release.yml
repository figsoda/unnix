name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.*

jobs:
  build:
    name: build
    runs-on: ${{ matrix.runner }}
    permissions: {}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies (musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt update
          sudo apt install musl-tools

      - name: Cargo build
        run: |
          rustup toolchain install nightly --profile minimal -t ${{ matrix.target }}
          cargo +nightly build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: -C strip=symbols

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: unnix-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/unnix

  artifacts:
    name: artifacts
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cargo build
        run: |
          rustup toolchain install nightly --profile minimal
          cargo +nightly build
        env:
          GENERATE_ARTIFACTS: artifacts

      # https://reproducible-builds.org/docs/archives/
      - name: Create tarball
        run: |
          tar --xz -cf artifacts.tar.xz artifacts \
            --sort=name \
            --mtime=@0 \
            --owner=0 --group=0 --numeric-owner \
            --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts.tar.xz
          path: artifacts.tar.xz

  release:
    name: release
    needs:
      - artifacts
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Release
        run: |
          mv artifacts/artifacts.tar.xz assets
          for path in artifacts/unnix-*; do
            mv "$path/unnix" "assets/${path#artifacts/}"
          done
          gh release create "$GITHUB_REF" assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --notes "[CHANGELOG.md](https://github.com/figsoda/unnix/blob/$GITHUB_REF/CHANGELOG.md)"
        env:
          GITHUB_TOKEN: ${{ github.token }}
